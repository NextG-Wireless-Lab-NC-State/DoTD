    number_of_shells: 1
    shell1:
        name: shell1
        orbits: 72
        sat_per_orbit: 22
        altitude: 550
        elevation_angle: 25
        inclination: 53
    topology:
        association_criteria_GSL: BASED_ON_DISTANCE_ONLY_MININET
        ISL: grid
    routing:
        algorithm: static_latency
        ip_range: 12.0.0.0
        interDomain_routing: 0
