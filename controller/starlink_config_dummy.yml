constellation:
    operator: starlink
    number_of_shells: 1
    shell1:
        name: shell1
        orbits: 1
        sat_per_orbit: 72
        altitude: 1000
        elevation_angle: 25
        inclination: 0
    topology:
        association_criteria_GSL: BASED_ON_DISTANCE_ONLY_MININET
        ISL: grid
    routing:
        algorithm: static_latency
        ip_range: 12.0.0.0
        interDomain_routing: 0
        border_gateway: gs220
        other_constellation_ip_range: 11.0.0.0

ground_stations:
    gs_file: ../mobility/ground_stations_fake.txt

simulation:
    start_time: 2023,09,13,8,50,00
    length: 600
    step: 15
    debug: 1

application:
    type: ping
    source: gs0
    destination: gs1
    duration: 45
    congestion_control: cubic
    result_out: ../analysis/results/GS0_GS1_ping.txt
    background_traffic: no
    tcpdump: no

resiliency:
  type: takedown
  affected_satellites: ["sat198", "sat454"]
  s_timestamps: ["2022,12,30,14,0,50", "2022,12,30,14,0,50"]
  e_timestamps: ["2022,12,30,14,1,20", "2022,12,30,14,1,20"]

data_n_results:
    connectivity_matrix: ../utils/connectivity_matrix/starlink/
    routing: ../utils/routing/starlink/
    simulation_results: ../results/starlink
